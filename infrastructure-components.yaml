apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: libvirtmachines.infrastructure.libvirt.io
spec:
  group: infrastructure.libvirt.io
  names:
    kind: LibvirtMachine
    listKind: LibvirtMachineList
    plural: libvirtmachines
    singular: libvirtmachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.labels.cluster\.x-k8s\.io/cluster-name
      name: Cluster
      type: string
    - jsonPath: .metadata.ownerReferences[?(@.kind=="Machine")].name
      name: Machine
      type: string
    - jsonPath: .status.instanceState
      name: State
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: string
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          LibvirtMachine is the root API object representing a libvirt‑backed
          Cluster‑API Machine.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              LibvirtMachineSpec describes the desired state of a libvirt‑backed virtual
              machine.
            properties:
              cloudInit:
                description: |-
                  CloudInit contains user‑data and network‑data that will be injected via
                  cloud‑init.
                properties:
                  networkData:
                    description: NetworkData is the cloud‑init network‑data payload.
                    type: string
                  userData:
                    description: UserData is the cloud‑init user‑data payload.
                    type: string
                type: object
              image:
                description: |-
                  Image identifies the base image that should be used. It can be a local
                  path, URL, or a short name resolvable by the reconciler.
                type: string
              memoryMB:
                default: 2048
                description: MemoryMB is the amount of RAM, in MiB, assigned to the
                  guest.
                format: int32
                type: integer
              numCPU:
                default: 2
                description: NumCPU is the number of virtual CPUs assigned to the
                  guest.
                format: int32
                type: integer
              providerID:
                description: |-
                  ProviderID is the domain UUID expressed in ProviderID format, e.g.
                    libvirt://<uuid>
                type: string
            required:
            - image
            type: object
          status:
            description: LibvirtMachineStatus captures the observed state of the VM.
            properties:
              addresses:
                description: Addresses lists IP addresses associated with the VM.
                items:
                  description: MachineAddress contains information for the node's
                    address.
                  properties:
                    address:
                      description: address is the machine address.
                      maxLength: 256
                      minLength: 1
                      type: string
                    type:
                      description: type is the machine address type, one of Hostname,
                        ExternalIP, InternalIP, ExternalDNS or InternalDNS.
                      enum:
                      - Hostname
                      - ExternalIP
                      - InternalIP
                      - ExternalDNS
                      - InternalDNS
                      type: string
                  required:
                  - address
                  - type
                  type: object
                type: array
              instanceState:
                description: InstanceState holds current libvirt domain state.
                type: string
              ready:
                description: Ready is true when the domain has been created and is
                  running.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
