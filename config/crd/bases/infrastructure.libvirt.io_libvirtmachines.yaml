    controller-gen.kubebuilder.io/version: v0.18.0
  name: libvirtmachines.infrastructure.libvirt.io
spec:
  group: infrastructure.libvirt.io
  names:
    kind: LibvirtMachine
    listKind: LibvirtMachineList
    plural: libvirtmachines
    singular: libvirtmachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.labels.cluster\.x-k8s\.io/cluster-name
      name: Cluster
      type: string
    - jsonPath: .metadata.ownerReferences[?(@.kind=="Machine")].name
      name: Machine
      type: string
    - jsonPath: .status.instanceState
      name: State
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: string
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          LibvirtMachine is the root API object representing a libvirt‑backed
          Cluster‑API Machine.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              LibvirtMachineSpec describes the desired state of a libvirt‑backed virtual
              machine.
            properties:
              cloudInit:
                description: |-
                  CloudInit contains user‑data and network‑data that will be injected via
                  cloud‑init.
                properties:
                  networkData:
                    description: NetworkData is the cloud‑init network‑data payload.
                    type: string
                  userData:
                    description: UserData is the cloud‑init user‑data payload.
